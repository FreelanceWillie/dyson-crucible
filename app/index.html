<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dyson Crucible</title>
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <!-- Top bar: brand, live resource meters, machine controls, actions -->
  <header id="topbar" class="topbar">
    <div class="brand"><span class="sun" aria-hidden="true"></span> Dyson&nbsp;Crucible</div>
    <div id="resbar" class="resbar" data-help="resources"></div>
    <div class="topactions">
      <button id="btnPalette" class="icon" title="Command palette (Ctrl K)">&#9776;<span class="kbd">Ctrl K</span></button>
      <button id="btnSettings" class="icon" data-help="settings" title="Settings">&#9881;</button>
      <button id="btnHelp" class="icon" title="Help">?</button>
    </div>
  </header>

  <!-- Doctor health banner (first-run setup guidance) -->
  <div id="doctor" class="doctor" data-help="doctor"></div>

  <!-- Main three-column layout -->
  <main class="layout">
    <aside id="rail" class="rail" data-help="tree"></aside>
    <section id="main" class="main" data-help="main"></section>
    <aside id="chatpanel" class="chatpanel" data-help="chat"></aside>
  </main>

  <!-- Queue strip -->
  <footer id="queuestrip" class="queuestrip" data-help="queue"></footer>

  <!-- Overlays -->
  <div id="modal" class="overlay"></div>
  <div id="settings" class="slideover"></div>
  <div id="help" class="helpoverlay"></div>
  <div id="palette" class="palette"></div>
  <div id="toasts" class="toasts"></div>

  <script type="module" src="/app/js/app.js"></script>
</body>
</html>
